<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <form action="">
        <h2>Datos personales basicos</h2>
        <label for=""></label> <!--cajoncito para añadir informacion osea el cuadrito-->
        <input type="text" id="nombreUsuario" name="nombre" placeholder="Ej: Juan Perez">

        <br></br><!-- <br> salto de linea-->
        <label for="correoUsuario" >Correo electronico</label>
        <input type="text" id="correoUsuario" name="email" placeholder="correo@ejemplo.com" required>
    </form>
    <form action="">
        <h2>Diferentes tipos de Inputs</h2>
        <label for="pass">Contraseña</label>
        <input type="password" name="Clave" id="pass"> <!--Input tipo contraseña-->
        <br><br>
        <label for="edad">Edad: </label>
        <input type="number" id="edad" name="edad" min="18" max="99">
        <br><br>
        <label for="nacimiento">Fecha Nacimiento: </label>
        <input type="date" id="nacimiento" name="fecha_nac">
        <br><br>
        <p>Selecciona tu plan</p>
        <input type="radio" name="Plan" id="planNetflix">
        <label for="planNetflix">Plan Netflix</label value="Barato">
        <br><br>
        <input type="radio" name="Plan" id="planAmazonPrime">
        <label for="planAmazonPrime">Plan Amazon Prime</label value="Accesible">
        <br><br>
        <input type="radio" name="Plan" id="planHBO_MAX">
        <label for="planHBO_MAX">Plan HBO MAX</label value="Costoso">
        <br><br>
        <input type="radio" name="Plan" id="planDisneyPlus">
        <label for="planDisneyPlus">Plan Disney Plus</label value="Rentable">
        <br><br>
        <input type="checkbox" id="terminos" name="terminos" required>
        <label for="terminos">Acepto terminos y condiciones</label>
        <button type="submit">Enviar Formulario</button>
        <button type="reset">Limpiar Formulario</button>
    </form>
</body>
</html>
